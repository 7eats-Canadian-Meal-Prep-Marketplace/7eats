name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

on:
  push:
    branches:
      - main

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: my-app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: my-app
        run: pnpm install --frozen-lockfile

      - name: Run lint
        working-directory: my-app
        run: pnpm lint

      - name: Run tests
        working-directory: my-app
        run: pnpm test:run

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify required Vercel environment variables
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is missing from GitHub Actions secrets"
            exit 1
          fi

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy project artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Ping IndexNow to notify Bing of updated URLs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET not set — skipping IndexNow ping"
            exit 0
          fi
          # Give the freshly promoted production deployment a moment to go live
          # on the production domain before pinging.
          sleep 15
          code=$(curl -s -o /tmp/indexnow.json -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://www.7eats.ca/api/indexnow)
          echo "IndexNow response ($code): $(cat /tmp/indexnow.json 2>/dev/null)"
          # SEO ping is best-effort: never fail the deploy over it.
          if [ "$code" != "200" ]; then
            echo "::warning::IndexNow ping returned HTTP $code (non-fatal)"
          fi
